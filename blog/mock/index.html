<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>模拟面试</title>
    <style>
        :root {
            --bg: #0a0a0f;
            --card: #151522;
            --text: #e8e8f0;
            --muted: #a0a0b8;
            --accent: #00f5ff;
            --border: rgba(255,255,255,0.08);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: "STKaiti", "KaiTi", "Kaiti SC", "Noto Serif SC", serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.8;
        }
        .wrap { max-width: 1080px; margin: 0 auto; padding: 28px 18px 40px; }
        .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
        .top a { color: var(--accent); text-decoration: none; }
        h1 { font-size: 1.8rem; margin-bottom: 8px; }
        .desc { color: var(--muted); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 14px; }
        .card {
            display: block;
            border: 1px solid var(--border);
            background: var(--card);
            border-radius: 12px;
            padding: 14px;
            color: var(--text);
            text-decoration: none;
        }
        .card:hover { border-color: var(--accent); }
        .card h2 { font-size: 1.08rem; margin-bottom: 6px; }
        .card p { color: var(--muted); font-size: 0.92rem; }
        .card .tag { display: inline-block; font-size: 0.75rem; padding: 2px 8px; border-radius: 6px; background: rgba(0,245,255,0.12); color: var(--accent); margin-top: 6px; }
        #auth-gate{display:none;position:fixed;inset:0;z-index:9999;background:#0a0a0f;align-items:center;justify-content:center;flex-direction:column;gap:14px}
        #auth-gate .lock{font-size:2.4rem;margin-bottom:4px}
        #auth-gate h2{font-size:1.2rem;color:var(--text);font-weight:600}
        #auth-gate input{width:260px;padding:10px 14px;border:1px solid var(--border);border-radius:8px;background:var(--card);color:var(--text);font-size:0.95rem;outline:none;font-family:inherit}
        #auth-gate input:focus{border-color:var(--accent)}
        #auth-gate button{padding:8px 28px;border:none;border-radius:8px;background:var(--accent);color:#0a0a0f;font-weight:700;font-size:0.92rem;cursor:pointer;font-family:inherit}
        #auth-gate button:hover{opacity:0.85}
        #auth-gate .err{color:#ff4466;font-size:0.85rem;min-height:1.2em}
        #main-content{display:none}
    </style>
</head>
<body>
    <div id="auth-gate">
        <div class="lock">🔒</div>
        <h2>需要密码访问</h2>
        <input type="password" id="auth-pwd" placeholder="请输入访问密码" autofocus>
        <button id="auth-btn">确认</button>
        <p class="err" id="auth-err"></p>
    </div>
    <div id="main-content" class="wrap">
        <div class="top">
            <h1>模拟面试</h1>
            <span><a href="../index.html">返回总题库</a> · <a href="../ai/index.html">AI 分页题库</a></span>
        </div>
        <p class="desc">针对特定岗位 JD 与个人简历定制的模拟面试题库，覆盖项目深挖、技术原理、系统设计与场景题，帮助系统化备面。</p>
        <div class="grid">
            <a class="card" href="./ant-agent.html">
                <h2>蚂蚁集团 · 智能体与大模型应用工程</h2>
                <p>2027 届转正实习 | 8 大类 65+ 题 | 项目深挖 + Agent 架构 + RAG + Context Engineering + LLM 基础 + 推理优化 + 工程化 + 场景题</p>
                <span class="tag">AI Agent</span>
                <span class="tag">RAG</span>
                <span class="tag">LLM</span>
                <span class="tag">系统设计</span>
            </a>
        </div>
    </div>
    <script src="./auth.js"></script>
</body>
</html>
